<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<script th:src="@{/js/review.js}" type="text/javascript"></script>
	<title th:text="'レビュー投稿' + ' | ' + #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user review_regist_page">
	<h2 th:class="title">レビュー投稿</h2>

	<div class="info_form_area">
		<div th:object="${orderItem}">
			<table class="detail_table">
				<tr>
					<th>商品名</th>
					<td th:text="*{item.name}"></td>
				</tr>
			</table>
		</div>

		<form th:action="@{/client/review/regist/complete}" th:object="${reviewForm}" method="post" class="user_info_form review_form">
			<ul th:if="${#fields.hasErrors('*')}" class="error_list">
				<li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
			</ul>

			<input type="hidden" th:field="*{orderItemId}" />
			<input type="hidden" th:field="*{itemId}" />

			<table class="input_table review_input_table">
				<tr>
					<th>評価</th>
					<td>
						<input type="radio" th:field="*{rating}" value="5" id="rating5" /><label for="rating5">★5</label>
						<input type="radio" th:field="*{rating}" value="4" id="rating4" /><label for="rating4">★4</label>
						<input type="radio" th:field="*{rating}" value="3" id="rating3" /><label for="rating3">★3</label>
						<input type="radio" th:field="*{rating}" value="2" id="rating2" /><label for="rating2">★2</label>
						<input type="radio" th:field="*{rating}" value="1" id="rating1" /><label for="rating1">★1</label>
					</td>
				</tr>
				<tr>
					<th>コメント</th>
					<td>
						<textarea th:field="*{reviewComment}" cols="50" rows="10"></textarea>
					</td>
				</tr>
			</table>
			<div class="button_area">
				<input type="submit" value="投稿する" class="send_button" />
			</div>
		</form>
		<div class="detail_button_area">
			<form th:action="@{/client/order/detail/{id}(id=${orderItem.order.id})}" method="post">
				<input type="submit" value="戻る" class="back_button" />
			</form>
		</div>
	</div>
</body>

</html>
