<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
<title th:text="#{top}+' | '+ #{shop.title}"> </title>
<meta charset="UTF-8" />
</head>
<body class="user index">
	<div>
		<h2 class="title">
				<span th:if="${sortType==1}" th:text="#{sort.latest.title}"></span>
				<span th:if="${sortType==2 || sortType==null}" th:text="#{sort.hotsell.title}"></span>
		</h2>
	</div>
	<div th:if="${#lists.isEmpty(items)}">
		<p th:text="#{msg.client.item.list.none}"></p>
	</div>
	<div class="item_list product_card_list">
		<th:block th:each="item, status: ${items}" th:if="${status.count le 10}">
			<!--/* 1件分の商品情報 */-->
			<article class="item product_card">
				<a class="product_card_link" th:href="@{/client/item/detail/}+${item.id}">
					<span class="product_card_image">
						<img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" th:alt="${item.name}" />
						<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" th:alt="${item.name}" />
					</span>
					<span class="product_card_body">
						<span class="item_name product_card_name" th:text="${item.name}"></span>
						<span class="item_review product_card_review">
							<th:block th:if="${item.reviewCount > 0}">
								<span class="star_rating">★</span>
								<span class="rating_value" th:text="${#numbers.formatDecimal(item.avgRating, 1, 1)}"></span>
								<span class="review_count" th:text="'(' + ${item.reviewCount} + ')'"></span>
							</th:block>
							<th:block th:unless="${item.reviewCount > 0}">
								<span class="no_review">評価なし</span>
							</th:block>
						</span>
						<span class="item_price product_card_price" th:text="'¥' + ${#numbers.formatDecimal(item.price, 1, 'COMMA', 0, 'POINT')}"></span>
					</span>
				</a>
			</article>
		</th:block>
	</div>
</body>
</html>
